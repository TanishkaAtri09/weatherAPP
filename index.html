<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather app</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style2.css">
</head>

<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false">
            <button ><i class="fa-solid fa-magnifying-glass" style="font-size: 40px;"></i></button>
        </div>
        <div class="weather">
            <img class="weather-icon" src="https://cdn2.iconfinder.com/data/icons/weather-filled-outline-3/64/weather07-512.png" height="250px" >
            <h1 class="temp">22°C</h1>
            <h2 class="city">New York</h2>
            <div class="details">
                <div class="col">
                    <img src="https://cdn-icons-png.flaticon.com/512/483/483552.png">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="https://cdn-icons-png.flaticon.com/512/414/414924.png">
                    <div>
                        <p class="wind">15 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const apiKey = "1ba278acd0985e1d36d1613341fc02fd";
        const apiUrl = " https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

        const searchBox=document.querySelector(".search input");
        const searchBtn=document.querySelector(".search button");
        const weathericon=document.querySelector(".weather-icon");




        async function checkWeather(city) {
            const response = await fetch(apiUrl + city+ `&appid=${apiKey}`);
            var data = await response.json();

            console.log(data);

            document.querySelector(".city").innerHTML=data.name;
            document.querySelector(".temp").innerHTML=data.main.temp + "°c";
            document.querySelector(".humidity").innerHTML=data.main.humidity +"%";
            document.querySelector(".wind").innerHTML=data.wind.speed + "km/h";

            if(data.weather[0].main=="Clouds"){
                weathericon.src="https://cdn-icons-png.flaticon.com/512/5903/5903939.png";
            }
            else if(data.weather[0].main=="Clear"){
                weathericon.src="https://i.pinimg.com/originals/53/22/c2/5322c2cad533e12e552d0dfdc89b4c25.png";
            }
            else if(data.weather[0].main=="Rain"){
                weathericon.src="https://cdn2.iconfinder.com/data/icons/weather-filled-outline-3/64/weather07-512.png";
            }
            else if(data.weather[0].main=="Drizzle"){
                weathericon.src="https://i.pinimg.com/originals/de/4f/61/de4f618c20951e5c725511c9e2c69649.png ";
            }
            else if(data.weather[0].main=="Mist"){
                weathericon.src="https://cdn-icons-png.flaticon.com/512/1197/1197102.png";
            }            
            else if(data.weather[0].main=="Snow"){
                weathericon.src="https://cdn-icons-png.flaticon.com/512/6221/6221304.png";
            } 
            else if(data.weather[0].main=="Haze"){
                weathericon.src="https://cdn-icons-png.flaticon.com/512/1779/1779862.png";
            }       
            else if(data.weather[0].main=="Smoke"){
                weathericon.src="https://cdn4.iconfinder.com/data/icons/weather-708/64/45_fog_cloud_weather_smoke_smog_transparent_wintry-512.png";
            } 
        }

   searchBtn.addEventListener("click",()=>{
    checkWeather(searchBox.value);
   })

        checkWeather();
    </script>
</body>

</html>
